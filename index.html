<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Lab</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <!-- SVG SPRITE -->
    <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
        <symbol id="ic-tag" viewBox="0 0 24 24">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" />
            <line x1="7" y1="7" x2="7.01" y2="7" />
        </symbol>
        <symbol id="ic-save" viewBox="0 0 24 24">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
        </symbol>
        <symbol id="ic-box" viewBox="0 0 24 24">
            <path
                d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z" />
            <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
            <line x1="12" y1="22.08" x2="12" y2="12" />
        </symbol>
        <symbol id="ic-home" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
        </symbol>
        <symbol id="ic-layers" viewBox="0 0 24 24">
            <polygon points="12 2 2 7 12 12 22 7 12 2" />
            <polyline points="2 17 12 22 22 17" />
            <polyline points="2 12 12 17 22 12" />
        </symbol>
        <symbol id="ic-menu" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
        </symbol>
        <symbol id="ic-chevron-d" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9" />
        </symbol>
        <symbol id="ic-edit" viewBox="0 0 24 24">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
        </symbol>
        <symbol id="ic-trash" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" />
        </symbol>
        <symbol id="ic-plus" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
        </symbol>
        <symbol id="ic-upload" viewBox="0 0 24 24">
            <polyline points="16 16 12 12 8 16" />
            <line x1="12" y1="12" x2="12" y2="21" />
            <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3" />
        </symbol>
        <symbol id="ic-download" viewBox="0 0 24 24">
            <polyline points="8 17 12 21 16 17" />
            <line x1="12" y1="12" x2="12" y2="21" />
            <path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29" />
        </symbol>
        <symbol id="ic-moon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
        </symbol>
        <symbol id="ic-sun" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </symbol>
        <symbol id="ic-search" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </symbol>
        <symbol id="ic-sidebar" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
        </symbol>
        <symbol id="ic-x" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
        </symbol>
        <symbol id="ic-folder" viewBox="0 0 24 24">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
        </symbol>
        <symbol id="ic-chart" viewBox="0 0 24 24">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </symbol>
        <symbol id="ic-globe" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z" />
        </symbol>
    </svg>

    <!-- MODALS -->
    <div class="overlay hidden" id="saveModal">
        <div class="sheet">
            <h3 data-i="save_modal_title"></h3>
            <div class="field"><label data-i="field_name"></label><input type="text" id="saveName" maxlength="60"></div>
            <div class="field"><label data-i="field_category"></label><select id="saveCatSel"></select></div>
            <div class="sheet-btns">
                <button class="btn" onclick="closeModal('saveModal')" data-i="cancel"></button>
                <button class="btn ac" onclick="confirmSave()" data-i="save"></button>
            </div>
        </div>
    </div>

    <div class="overlay hidden" id="catModal">
        <div class="sheet">
            <h3 data-i="cat_modal_title"></h3>
            <div class="field"><label data-i="field_cat_name"></label><input type="text" id="catNameInput"
                    maxlength="40"></div>
            <div class="field"><label data-i="field_color"></label>
                <div class="swatch-row" id="swatchRow"></div>
            </div>
            <div class="sheet-btns">
                <button class="btn" onclick="closeModal('catModal')" data-i="cancel"></button>
                <button class="btn ac" onclick="confirmAddCat()" data-i="create"></button>
            </div>
        </div>
    </div>

    <div class="overlay hidden" id="renameModal">
        <div class="sheet">
            <h3 data-i="rename_title"></h3>
            <div class="field"><input type="text" id="renameInput" maxlength="60"></div>
            <div class="sheet-btns">
                <button class="btn" onclick="closeModal('renameModal')" data-i="cancel"></button>
                <button class="btn ac" onclick="confirmRename()" data-i="save"></button>
            </div>
        </div>
    </div>

    <!-- SIDEBAR OVERLAY (mobile) -->
    <div class="sidebar-overlay hidden" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <!-- BOTTOM NAV (conditionally shown via JS) -->
    <nav class="bottom-nav" id="bottomNav">
        <div class="bottom-nav-inner">
            <button class="bn-btn active" id="bn-resale" onclick="goPage('resale')">
                <span class="bn-icon"><svg class="ico ico-lg">
                        <use href="#ic-box" />
                    </svg></span>
                <span data-i="nav_resale"></span>
            </button>
            <button class="bn-btn" id="bn-rental" onclick="goPage('rental')">
                <span class="bn-icon"><svg class="ico ico-lg">
                        <use href="#ic-home" />
                    </svg></span>
                <span data-i="nav_rental"></span>
            </button>
            <button class="bn-btn" id="bn-saved" onclick="goPage('saved')">
                <span class="bn-icon"><svg class="ico ico-lg">
                        <use href="#ic-save" />
                    </svg></span>
                <span data-i="nav_saved"></span>
                <span class="bn-badge" id="bnBadge" style="display:none">0</span>
            </button>
            <button class="bn-btn" id="bn-cats" onclick="goPage('cats')">
                <span class="bn-icon"><svg class="ico ico-lg">
                        <use href="#ic-tag" />
                    </svg></span>
                <span data-i="nav_cats"></span>
            </button>
        </div>
    </nav>

    <!-- SHELL -->
    <div class="shell">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="brand">Profit <em>Lab</em></span>
            </div>

            <div class="sidebar-scroll">
                <div class="s-label" id="sl-calc"><span data-i="sl_calculators"></span></div>
                <button class="nav-item active" id="ni-resale" onclick="goPage('resale')">
                    <span class="ni-icon"><svg class="ico">
                            <use href="#ic-box" />
                        </svg></span>
                    <span class="ni-label" data-i="nav_resale"></span>
                </button>
                <button class="nav-item" id="ni-rental" onclick="goPage('rental')">
                    <span class="ni-icon"><svg class="ico">
                            <use href="#ic-home" />
                        </svg></span>
                    <span class="ni-label" data-i="nav_rental"></span>
                </button>
                <button class="nav-item" id="ni-saved" onclick="goPage('saved')">
                    <span class="ni-icon"><svg class="ico">
                            <use href="#ic-save" />
                        </svg></span>
                    <span class="ni-label" data-i="nav_saved"></span>
                    <span class="ni-badge" id="siBadge">0</span>
                </button>
                <button class="nav-item" id="ni-cats" onclick="goPage('cats')">
                    <span class="ni-icon"><svg class="ico">
                            <use href="#ic-tag" />
                        </svg></span>
                    <span class="ni-label" data-i="nav_cats"></span>
                </button>

                <div class="s-label" style="margin-top:14px">
                    <span data-i="sl_categories"></span>
                    <button onclick="openCatModal()"><svg class="ico ico-sm" style="stroke:currentColor">
                            <use href="#ic-plus" />
                        </svg></button>
                </div>
                <div id="catSidebarList"></div>
            </div>

            <div class="sidebar-footer">
                <button class="sf-btn" onclick="toggleTheme()" id="themeBtn">
                    <svg class="ico ico-sm">
                        <use href="#ic-sun" />
                    </svg>
                    <span class="sf-label" data-i="theme_light"></span>
                </button>
                <button class="sf-btn" onclick="exportData()">
                    <svg class="ico ico-sm">
                        <use href="#ic-download" />
                    </svg>
                    <span class="sf-label" data-i="export_btn"></span>
                </button>
                <div class="lang-wrap" id="langWrap">
                    <button class="sf-btn" id="langBtn" onclick="toggleLangMenu(event)">
                        <svg class="ico ico-sm">
                            <use href="#ic-globe" />
                        </svg>
                        <span class="sf-label" id="langLabel">Language</span>
                    </button>
                    <div class="lang-menu" id="langMenu">
                        <button onclick="setLang('en');closeLangMenu()">English</button>
                        <button onclick="setLang('ru');closeLangMenu()">Русский</button>
                        <button onclick="setLang('uk');closeLangMenu()">Українська</button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- CONTENT AREA -->
        <div class="content-area">
            <div class="topbar">
                <!-- unified sidebar toggle: collapse on desktop, open/close on mobile -->
                <button class="tb-btn" id="sidebarToggleBtn" onclick="handleSidebarToggle()">
                    <svg class="ico">
                        <use href="#ic-menu" />
                    </svg>
                </button>
                <div class="topbar-title" id="topbarTitle">Resale <em>Profit</em></div>
            </div>

            <div class="scroll-body" id="scrollBody">

                <!-- PAGE: RESALE -->
                <div class="page active" id="page-resale">
                    <div class="calc-tabs">
                        <button class="ctab active" id="ct-resale-calc" onclick="switchCalcTab('resale','calc')"
                            data-i="tab_calc"></button>
                        <button class="ctab" id="ct-resale-saved" onclick="switchCalcTab('resale','saved')"
                            data-i="tab_saved"></button>
                    </div>
                    <div id="resale-calc-pane">
                        <div id="resaleObjects"></div>
                        <div class="btn-row">
                            <button class="btn ac" onclick="addResaleObj()"><svg class="ico ico-sm">
                                    <use href="#ic-plus" />
                                </svg><span data-i="add_item"></span></button>
                            <button class="btn" onclick="openSaveModal('resale')"><svg class="ico ico-sm">
                                    <use href="#ic-upload" />
                                </svg><span data-i="save_calc"></span></button>
                        </div>
                        <div id="resaleSummary" style="margin-top:1rem"></div>
                        <div class="card" style="margin-top:.65rem">
                            <div class="chart-header">
                                <span data-i="chart_months_label"></span>
                                <input type="number" id="chartMonths" value="12" min="1" max="120" class="ns"
                                    oninput="renderResaleChart()">
                            </div>
                            <div class="chart-wrap"><canvas id="resaleChart"></canvas></div>
                        </div>
                    </div>
                    <div id="resale-saved-pane" style="display:none">
                        <div id="resaleSavedList"></div>
                    </div>
                </div>

                <!-- PAGE: RENTAL -->
                <div class="page" id="page-rental">
                    <div class="calc-tabs">
                        <button class="ctab active" id="ct-rental-calc" onclick="switchCalcTab('rental','calc')"
                            data-i="tab_calc"></button>
                        <button class="ctab" id="ct-rental-saved" onclick="switchCalcTab('rental','saved')"
                            data-i="tab_saved"></button>
                    </div>
                    <div id="rental-calc-pane">
                        <div id="rentalObjects"></div>
                        <div class="btn-row">
                            <button class="btn blue" onclick="addRentalObj()"><svg class="ico ico-sm">
                                    <use href="#ic-plus" />
                                </svg><span data-i="add_object"></span></button>
                            <button class="btn" onclick="openSaveModal('rental')"><svg class="ico ico-sm">
                                    <use href="#ic-upload" />
                                </svg><span data-i="save_calc"></span></button>
                        </div>
                        <div id="rentalSummary" style="margin-top:1rem"></div>
                        <div class="card" style="margin-top:.65rem">
                            <div class="chart-header"><span data-i="chart_rental_label"></span></div>
                            <div class="chart-wrap"><canvas id="rentalChart"></canvas></div>
                        </div>
                    </div>
                    <div id="rental-saved-pane" style="display:none">
                        <div id="rentalSavedList"></div>
                    </div>
                </div>

                <!-- PAGE: SAVED -->
                <div class="page" id="page-saved">
                    <div class="search-wrap">
                        <span class="si"><svg class="ico ico-sm">
                                <use href="#ic-search" />
                            </svg></span>
                        <input type="text" id="searchInput" oninput="renderSavedPage()">
                    </div>
                    <div style="display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap">
                        <select id="filterCat" onchange="renderSavedPage()"
                            style="flex:1;min-width:120px;padding-left:10px"></select>
                        <select id="filterType" onchange="renderSavedPage()"
                            style="flex:1;min-width:100px;padding-left:10px"></select>
                    </div>
                    <div id="savedPageList"></div>
                </div>

                <!-- PAGE: CATS -->
                <div class="page" id="page-cats">
                    <div class="btn-row" style="margin:0 0 .75rem">
                        <button class="btn ac" onclick="openCatModal()"><svg class="ico ico-sm">
                                <use href="#ic-plus" />
                            </svg><span data-i="new_cat"></span></button>
                    </div>
                    <div id="catPageList"></div>
                </div>

            </div><!-- /scroll-body -->
        </div><!-- /content-area -->

    </div><!-- /shell -->

</body>

</html>
